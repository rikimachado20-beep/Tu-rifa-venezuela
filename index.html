<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Rifa Venezuela</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; padding: 20px; }
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(55px, 1fr)); gap: 10px; max-width: 500px; margin: 20px auto; }
        .n { padding: 15px; background: #333; border-radius: 8px; cursor: pointer; border: 1px solid #444; }
        .s { background: #ffcc00 !important; color: #000; font-weight: bold; }
        #btn { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #25d366; color: #fff; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🎰 SELECCIONA TUS NÚMEROS</h1>
    <div id="grid"></div>
    <a href="#" id="btn">ENVIAR A WHATSAPP</a>

    <script>
        const total = 100;
        let sel = [];
        const g = document.getElementById('grid');
        const b = document.getElementById('btn');

        for (let i = 1; i <= total; i++) {
            let d = document.createElement('div');
            d.className = 'n';
            d.innerText = i.toString().padStart(2, '0');
            d.onclick = function() {
                if (sel.includes(i)) {
                    sel = sel.filter(n => n !== i);
                    this.classList.remove('s');
                } else {
                    sel.push(i);
                    this.classList.add('s');
                }
                
                if (sel.length > 0) {
                    b.style.display = 'block';
                    // FORMATO FIJO PARA EVITAR ERRORES DE ACCESO AL SITIO
                    let texto = "Hola, quiero apartar los números: " + sel.sort((x, y) => x - y).join(', ');
                    b.href = "https://api.whatsapp.com" + encodeURIComponent(texto);
                } else {
                    b.style.display = 'none';
                }
            };
            g.appendChild(d);
        }
    </script>
</body>
</html>
