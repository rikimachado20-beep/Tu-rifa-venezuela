<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Rifa</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; }
        #contenedor { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 10px; padding: 20px; max-width: 500px; margin: auto; }
        .n { padding: 15px; background: #333; border-radius: 5px; cursor: pointer; border: 1px solid #444; }
        .s { background: #ffcc00 !important; color: black; font-weight: bold; }
        #btn-wa { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #25d366; color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <h2>Selecciona tus Números</h2>
    <div id="contenedor"></div>
    <a href="#" id="btn-wa">APARTAR POR WHATSAPP</a>

    <script>
        let elegidos = [];
        const caja = document.getElementById('contenedor');
        const boton = document.getElementById('btn-wa');

        for (let i = 1; i <= 100; i++) {
            let div = document.createElement('div');
            div.className = 'n';
            div.innerText = i.toString().padStart(2, '0');
            
            div.onclick = function() {
                if (elegidos.includes(i)) {
                    elegidos = elegidos.filter(n => n !== i);
                    this.classList.remove('s');
                } else {
                    elegidos.push(i);
                    this.classList.add('s');
                }
                
                if (elegidos.length > 0) {
                    boton.style.display = 'block';
                    // ESTA ES LA PARTE QUE CORREGIMOS:
                    let numStr = elegidos.sort((a,b)=>a-b).join('-');
                    boton.href = "https://wa.me_" + numStr;
                } else {
                    boton.style.display = 'none';
                }
            };
            caja.appendChild(div);
        }
    </script>
</body>
</html>
